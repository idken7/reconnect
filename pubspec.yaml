name: reconnect
description: Reconnect with old friends through contact discovery and location-aware suggestions.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.11.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_contacts: ^1.1.9+2
  geolocator: ^12.0.0
  http: ^1.2.2
  permission_handler: ^11.3.1
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  mockito: ^5.4.4
  build_runner: ^2.4.6
  integration_test:
    sdk: flutter

dependency_overrides:
  flutter_contacts:
    path: third_party/flutter_contacts

flutter:
  uses-material-design: true
